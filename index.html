<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elina I Love You 💖</title>
    <style>
        :root {
            --pink-light: #ff9a9e;
            --pink-dark: #fad0c4;
            --purple: #a18cd1;
            --red: #ff6b9d;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            height: 100dvh;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .galaxy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: shoot 3s linear infinite;
            opacity: 0;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(25deg);
                opacity: 1;
            }
            10% { opacity: 1; }
            20% {
                transform: translate(-400px, 200px) rotate(25deg);
                opacity: 0;
            }
            100% {
                transform: translate(-400px, 200px) rotate(25deg);
                opacity: 0;
            }
        }

        .aurora {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 30% 30%, rgba(255, 105, 180, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 40%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 192, 203, 0.1) 0%, transparent 50%);
            animation: auroraMove 20s linear infinite;
        }

        @keyframes auroraMove {
            0% { transform: rotate(0deg) scale(1.5); }
            50% { transform: rotate(180deg) scale(1.8); }
            100% { transform: rotate(360deg) scale(1.5); }
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(255, 105, 180, 0.2),
                0 0 100px rgba(138, 43, 226, 0.1),
                inset 0 0 60px rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            width: min(650px, 95vw);
            max-width: 650px;
            height: calc(100vh - 20px);
            height: calc(100dvh - 20px);
            max-height: 800px;
            animation: containerFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 8px;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(255, 105, 180, 0.1),
                transparent,
                rgba(138, 43, 226, 0.1),
                transparent
            );
            animation: rotateBorder 8s linear infinite;
            pointer-events: none;
        }

        .container::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: rgba(10, 10, 10, 0.8);
            border-radius: 16px;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-section {
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }

        .love-icon {
            font-size: 1.8rem;
            animation: iconBounce 1s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-10px) scale(1.1); }
            50% { transform: translateY(0) scale(1); }
            75% { transform: translateY(-5px) scale(1.05); }
        }

        .title {
            color: transparent;
            background: linear-gradient(135deg, #ff6b9d, #c44dff, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 8px 0;
            animation: titleShine 3s ease-in-out infinite;
            background-size: 200% 200%;
        }

        @keyframes titleShine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .sparkle-text {
            display: inline-block;
            animation: sparkle 1.5s infinite;
        }

        @keyframes sparkle {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5) drop-shadow(0 0 10px gold); }
        }

        .love-counter {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 5px 0;
            flex-wrap: nowrap;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }

        .counter-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 1;
            min-width: 60px;
            max-width: 120px;
        }

        .counter-number {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }

        .counter-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.6rem;
            margin-top: 2px;
        }

        .love-letter {
            position: relative;
            z-index: 2;
            cursor: pointer;
            flex-shrink: 0;
        }

        .envelope {
            font-size: 2rem;
            animation: envelopeFloat 2s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
            display: inline-block;
        }

        .envelope:hover {
            transform: scale(1.2);
        }

        @keyframes envelopeFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-5px) rotate(3deg); }
        }

        .select-wrapper {
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }

        .language-select {
            width: 100%;
            padding: 10px 15px;
            font-size: 0.85rem;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            outline: none;
            cursor: pointer;
            transition: all 0.4s ease;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .language-select:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 105, 180, 0.6);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
        }

        .language-select:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
        }

        .language-select option {
            background: #1a1a2e;
            color: white;
            padding: 10px;
        }

        .result-box {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            height: 100px;
            min-height: 100px;
            max-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
            overflow: hidden;
            flex-shrink: 0;
            opacity: 1;
        }

        .result-inner {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .love-text {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 
                0 0 20px rgba(255, 105, 180, 0.8),
                0 0 40px rgba(255, 105, 180, 0.4),
                0 0 60px rgba(138, 43, 226, 0.3);
            animation: loveGlow 2s ease-in-out infinite;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        @keyframes loveGlow {
            0%, 100% { 
                text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
                transform: scale(1);
            }
            50% { 
                text-shadow: 0 0 40px rgba(255, 105, 180, 1), 0 0 80px rgba(255, 105, 180, 0.6), 0 0 100px rgba(138, 43, 226, 0.4);
                transform: scale(1.02);
            }
        }

        .sender-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.7rem;
            font-style: italic;
        }

        .sender-text .heart {
            color: #ff3366;
            animation: heartBeat 0.8s infinite;
            display: inline-block;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
        }

        .result-quote {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
            transition: opacity 0.5s ease;
        }

        .music-btn {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            flex-shrink: 0;
        }

        .music-btn:hover {
            background: rgba(255, 105, 180, 0.3);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
        }

        .music-btn.playing {
            background: rgba(255, 105, 180, 0.4);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 105, 180, 0.4); }
            50% { box-shadow: 0 0 50px rgba(255, 105, 180, 0.8); }
        }

        .secret-message {
            position: absolute;
            z-index: 10;
            background: rgba(10, 10, 15, 0.95);
            border-radius: 15px;
            padding: 15px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 90%;
            max-width: 500px;
            backdrop-filter: blur(20px);
        }

        .secret-message.show {
            display: block;
            animation: fadeSlideIn 0.5s ease;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .float-heart {
            position: absolute;
            animation: floatUp 4s ease-in forwards;
            font-size: 1.5rem;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0);
                opacity: 1;
            }
            50% {
                opacity: 1;
                transform: translateY(-150px) rotate(180deg) scale(1.5);
            }
            100% {
                transform: translateY(-300px) rotate(360deg) scale(0);
                opacity: 0;
            }
        }

        .heart-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .rain-heart {
            position: absolute;
            animation: rainDown linear forwards;
            opacity: 0.6;
        }

        @keyframes rainDown {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 4;
            pointer-events: none;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-height: 700px) {
            .container {
                gap: 4px;
            }
            .love-icon {
                font-size: 1.5rem;
            }
            .title {
                font-size: 1.1rem;
                margin: 5px 0;
            }
            .counter-item {
                padding: 4px 8px;
            }
            .counter-number {
                font-size: 1rem;
            }
            .envelope {
                font-size: 1.5rem;
            }
            .result-box {
                height: 90px;
                min-height: 90px;
                max-height: 90px;
            }
            .love-text {
                font-size: 1rem;
            }
        }

        @media (max-height: 600px) {
            .title {
                font-size: 1rem;
            }
            .love-counter {
                gap: 4px;
            }
            .counter-item {
                padding: 3px 6px;
            }
            .counter-number {
                font-size: 0.9rem;
            }
            .counter-label {
                font-size: 0.55rem;
            }
            .result-box {
                height: 75px;
                min-height: 75px;
                max-height: 75px;
            }
            .love-text {
                font-size: 0.9rem;
            }
            .sender-text {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="galaxy-bg">
        <div class="stars" id="stars"></div>
        <div class="aurora"></div>
    </div>

    <div class="hearts-container" id="heartsContainer"></div>
    <div class="heart-rain" id="heartRain"></div>

    <div class="main-wrapper">
        <div class="container" id="mainContainer">
            <div class="header-section">
                <div class="love-icon">💖</div>
                <h1 class="title">
                    <span class="sparkle-text">✨ عشق من الینا ✨</span>
                </h1>
            </div>

            <div class="love-counter">
                <div class="counter-item">
                    <div class="counter-number" id="daysCounter">۰</div>
                    <div class="counter-label">روز همقدم</div>
                </div>
                <div class="counter-item">
                    <div class="counter-number" id="langCounter">۰</div>
                    <div class="counter-label">زبون</div>
                </div>
                <div class="counter-item">
                    <div class="counter-number" id="heartCounter">۰</div>
                    <div class="counter-label">قلب شلیک شده</div>
                </div>
            </div>

            <div class="love-letter" onclick="showSecretMessage()">
                <span class="envelope">💌</span>
                <div style="color: rgba(255,255,255,0.6); font-size: 0.65rem;">
                   روی من کلیک کن
                </div>
            </div>

            <div class="select-wrapper">
                <select class="language-select" id="languageSelect" onchange="showLove(this.value)">
                    <option value="">🌠 یه زبون انتخاب کن 🌠</option>
                </select>
            </div>

            <div class="result-box" id="resultBox">
                <div class="result-inner">
                    <p style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">
                         زود یه زبون انتخاب کن...
                    </p>
                </div>
            </div>

            <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
                🎵 آهنگ تو
            </button>

            <div class="secret-message" id="secretMessage">
                <p style="color: #ff6b9d; font-size: 0.9rem; line-height: 1.8; text-align: center;">
                    الینام ❤️<br>
                    تو برای من عزیز ترینی<br>
                    تو بهترین اتفاق زندگی منی<br>
                    خوردنی ترین، خوش مزه ترین<br>
                    زیبا ترین، با نمک ترین<br>
                    خوش بو ترین، خوش خنده ترین<br>
                    تو همه ی ترین های قشنگ زندگی منی<br>
                    دوست دارم بدون "تا" 💕
                </p>
                <button onclick="document.getElementById('secretMessage').classList.remove('show')" 
                        style="margin-top: 10px; padding: 8px 20px; background: #ff6b9d; color: white; border: none; border-radius: 20px; cursor: pointer;">
                    ✨
                </button>
            </div>
        </div>
    </div>

    <audio id="loveMusic" loop>
        <source src="Khalegh - Moein (320).mp3" type="audio/mpeg">
    </audio>

    <script>
        // ============================================
        // GLOBAL VARIABLES - حتماً اینجا تعریف بشن
        // ============================================
        const loveTranslations = {

        const loveQuotes = [
            "تو خورشیدی نوری که زندگیمو روشن کرده ✨",
            "هر لحظه با تو بودن رنگ گرفتن رویا های منه 🌈",
            "قلبم برات بوم بوم بوممممم ",
            "تو بهترین هدیه‌ی خدا به منی 🎁",
            "صدای تو مثل یه آهنگ قشنگه توی گوشم 🎶",

            "با تو حتی سخت‌ترین روزها هم شیرینن",
            "تو تموم لبخندای هر روز منی",
            "قلب و وجود منی الینا"
        ];

        // ============================================
        // COUNTERS
        // ============================================
        let langVisitCount = 0;
        let heartThrowCount = 0;
        let musicPlaying = false;
        const loveStartDate = new Date('2026-02-06');
        
        function updateDaysCounter() {
            const today = new Date();
            const diffTime = Math.abs(today - loveStartDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('daysCounter').textContent = diffDays.toLocaleString('fa-IR');
        }

        function updateLangCounter() {
            langVisitCount++;
            document.getElementById('langCounter').textContent = langVisitCount.toLocaleString('fa-IR');
        }

        function updateHeartCounter() {
            heartThrowCount++;
            document.getElementById('heartCounter').textContent = heartThrowCount.toLocaleString('fa-IR');
        }

        // ============================================
        // POPULATE LANGUAGE SELECT
        // ============================================
        function populateLanguageSelect() {
            const select = document.getElementById('languageSelect');
            const languages = [
                { code: 'fa', name: '🇮🇷 فارسی (Persian)' },
                { code: 'en', name: '🇬🇧 English' },
                { code: 'ar', name: '🇸🇦 العربية' },
                { code: 'tr', name: '🇹🇷 Türkçe' },
                { code: 'fr', name: '🇫🇷 Français' },
                { code: 'es', name: '🇪🇸 Español' },
                { code: 'de', name: '🇩🇪 Deutsch' },
                { code: 'it', name: '🇮🇹 Italiano' },
                { code: 'pt', name: '🇧🇷 Português' },
                { code: 'ru', name: '🇷🇺 Русский' },
                { code: 'ja', name: '🇯🇵 日本語' },
                { code: 'ko', name: '🇰🇷 한국어' },
                { code: 'zh', name: '🇨🇳 中文' },
                { code: 'hi', name: '🇮🇳 हिन्दी' },
                { code: 'nl', name: '🇳🇱 Nederlands' },
                { code: 'sv', name: '🇸🇪 Svenska' },
                { code: 'no', name: '🇳🇴 Norsk' },
                { code: 'fi', name: '🇫🇮 Suomi' },
                { code: 'pl', name: '🇵🇱 Polski' },
                { code: 'uk', name: '🇺🇦 Українська' },
                { code: 'el', name: '🇬🇷 Ελληνικά' },
                { code: 'he', name: '🇮🇱 עברית' },
                { code: 'th', name: '🇹🇭 ไทย' },
                { code: 'vi', name: '🇻🇳 Tiếng Việt' },
                { code: 'id', name: '🇮🇩 Bahasa' },
                { code: 'sw', name: '🇹🇿 Kiswahili' },
                { code: 'ro', name: '🇷🇴 Română' },
                { code: 'hu', name: '🇭🇺 Magyar' },
                { code: 'cs', name: '🇨🇿 Čeština' },
                { code: 'eo', name: '🌍 Esperanto' },
                { code: 'la', name: '🏛️ Latina' }
            ];

            languages.forEach(lang => {
                const option = document.createElement('option');
                option.value = lang.code;
                option.textContent = lang.name;
                select.appendChild(option);
            });
        }

        // ============================================
        // SHOW LOVE FUNCTION - نسخه نرم با quote
        // ============================================
        function showLove(lang) {
            if (!lang) return;
            
            const translation = loveTranslations[lang] || loveTranslations['en'];
            const resultBox = document.getElementById('resultBox');
            
            const shortTranslation = translation.length > 40 ? 
                translation.substring(0, 37) + '...' : translation;
            
            // گرفتن یه quote رندوم
            const randomQuote = loveQuotes[Math.floor(Math.random() * loveQuotes.length)];
            
            // Fade out نرم
            resultBox.style.opacity = '0';
            resultBox.style.transform = 'scale(0.95)';
            resultBox.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
            
            // بعد از fade out، محتوا عوض بشه
            setTimeout(() => {
                resultBox.innerHTML = `
                    <div class="result-inner">
                        <div class="love-text">${shortTranslation}</div>
                        <div class="sender-text">
                            از طرف <strong>لیمو شیرینت، علیرضا</strong> <span class="heart">❤️</span>
                        </div>
                        <div class="result-quote" style="opacity: 0;">
                            ${randomQuote}
                        </div>
                    </div>
                `;
                
                // Fade in نرم
                requestAnimationFrame(() => {
                    resultBox.style.opacity = '1';
                    resultBox.style.transform = 'scale(1)';
                    
                    // Quote با تاخیر 300ms ظاهر بشه
                    setTimeout(() => {
                        const quoteEl = resultBox.querySelector('.result-quote');
                        if (quoteEl) {
                            quoteEl.style.opacity = '1';
                        }
                    }, 300);
                });
            }, 200);
            
            createBurstHearts();
            createConfetti();
            updateLangCounter();
            
            if (navigator.vibrate) {
                navigator.vibrate([50, 50, 50, 50, 100]);
            }
        }

        // ============================================
        // SPECIAL EFFECTS
        // ============================================
        function createBurstHearts() {
            const container = document.getElementById('heartsContainer');
            const hearts = ['💕', '💖', '💗', '💓', '💝', '❤️', '💘', '💞', '😍', '🥰'];
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('span');
                    heart.classList.add('float-heart');
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = (30 + Math.random() * 40) + '%';
                    heart.style.top = '50%';
                    heart.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
                    heart.style.animationDuration = (2 + Math.random() * 3) + 's';
                    
                    container.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 4000);
                }, i * 60);
            }
            updateHeartCounter();
        }

        function createConfetti() {
            const colors = ['#ff6b9d', '#ffd700', '#ff3366', '#c44dff', '#ff9a9e', '#a18cd1', '#ff69b4', '#00d2ff'];
            
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti-piece');
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-20px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
                    confetti.style.width = (6 + Math.random() * 8) + 'px';
                    confetti.style.height = (6 + Math.random() * 8) + 'px';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }

        function startHeartRain() {
            const container = document.getElementById('heartRain');
            const hearts = ['💕', '💖', '💗', '💓', '💝', '❤️', '✨', '🌟'];
            
            setInterval(() => {
                const heart = document.createElement('span');
                heart.classList.add('rain-heart');
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = '-30px';
                heart.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
                heart.style.animationDuration = (5 + Math.random() * 5) + 's';
                heart.style.opacity = (0.2 + Math.random() * 0.3);
                
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 8000);
            }, 600);
        }

        function createStars() {
            const starsContainer = document.getElementById('stars');
            
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.width = (1 + Math.random() * 3) + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--delay', Math.random() * 4 + 's');
                starsContainer.appendChild(star);
            }

            for (let i = 0; i < 3; i++) {
                const shootingStar = document.createElement('div');
                shootingStar.classList.add('shooting-star');
                shootingStar.style.top = (10 + Math.random() * 40) + '%';
                shootingStar.style.left = (60 + Math.random() * 40) + '%';
                shootingStar.style.animationDelay = (Math.random() * 5) + 's';
                shootingStar.style.animationDuration = (2 + Math.random() * 3) + 's';
                starsContainer.appendChild(shootingStar);
            }
        }

        // ============================================
        // INTERACTIVE FEATURES
        // ============================================
        function showSecretMessage() {
            const msg = document.getElementById('secretMessage');
            msg.classList.toggle('show');
            
            if (msg.classList.contains('show')) {
                createBurstHearts();
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }

        function toggleMusic() {
            const audio = document.getElementById('loveMusic');
            const btn = document.getElementById('musicBtn');
            
            if (musicPlaying) {
                audio.pause();
                btn.classList.remove('playing');
                btn.innerHTML = '🎵 آهنگ تو';
                musicPlaying = false;
            } else {
                audio.play().catch(() => {
                    alert('🎵 یه جای صفحه کلیک کن تا آهنگ پخش بشه!');
                });
                btn.classList.add('playing');
                btn.innerHTML = '🎵 قطع بشه :(';
                musicPlaying = true;
                createConfetti();
            }
        }

        // Click anywhere for hearts
        document.addEventListener('click', function(e) {
            if (e.target.closest('select') || e.target.closest('button') || e.target.closest('.secret-message')) return;
            
            const heart = document.createElement('span');
            heart.classList.add('float-heart');
            heart.textContent = '💕';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            heart.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
            heart.style.position = 'fixed';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '9999';
            
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 4000);
            
            updateHeartCounter();
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            populateLanguageSelect();
            createStars();
            startHeartRain();
            updateDaysCounter();
            
            setInterval(updateDaysCounter, 60000);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    document.getElementById('languageSelect').focus();
                }
            });

            console.log('%c💖 سایت عاشقونه با موفقیت بارگذاری شد! 💖', 'color: #ff6b9d; font-size: 20px;');
            console.log('%cساخته شده با عشق برای الینا ❤️', 'color: #c44dff; font-size: 16px;');
            
            // تست اینکه quotes کار میکنه
            console.log('Quotes loaded:', loveQuotes.length, 'items');
        }

        // مطمئن شو همه چی اجرا بشه
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
